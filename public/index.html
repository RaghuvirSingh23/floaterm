<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>floaterm</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white' stroke='%23222' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'><rect x='1' y='1' width='22' height='22' rx='4' fill='white' stroke='%23222' stroke-width='1.5'/><polyline points='6 16 11 11 6 6' fill='none' stroke='%23222' stroke-width='2'/><line x1='13' y1='18' x2='19' y2='18' stroke='%23222' stroke-width='2'/></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
  <div id="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 17 10 11 4 5"/>
      <line x1="12" y1="19" x2="20" y2="19"/>
    </svg>
    <span>floaterm</span>
  </div>
  <div id="toolbar">
    <button id="tool-draw" class="tool-btn active" title="Draw terminal (D)">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="12" height="12" rx="2" stroke-dasharray="3 2"/>
        <line x1="9" y1="1" x2="9" y2="5"/>
        <line x1="7" y1="3" x2="11" y2="3"/>
      </svg>
    </button>
    <button id="tool-hand" class="tool-btn" title="Hand tool (H)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 11V6a2 2 0 0 0-4 0"/>
        <path d="M14 10V4a2 2 0 0 0-4 0v2"/>
        <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L8 16"/>
      </svg>
    </button>
    <div class="toolbar-divider"></div>
    <button id="tool-spawn" class="tool-btn" title="New terminal">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="12" height="12" rx="2"/>
        <line x1="9" y1="6" x2="9" y2="12"/>
        <line x1="6" y1="9" x2="12" y2="9"/>
      </svg>
    </button>
  </div>
  <div id="quick-spawn-wrapper">
    <button id="quick-spawn-btn" title="Quick spawn">
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="9" y1="3" x2="9" y2="15"/>
        <line x1="3" y1="9" x2="15" y2="9"/>
      </svg>
      <span>New</span>
    </button>
    <div id="quick-spawn-menu" class="hidden">
      <div class="qs-section-label">Tools</div>
      <div class="qs-item" data-cmd="claude" data-label="claude">

        Claude Code
      </div>
      <div class="qs-item" data-cmd="codex" data-label="codex">
        <span class="qs-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M14.949 6.547a3.94 3.94 0 0 0-.348-3.273 4.11 4.11 0 0 0-4.4-1.934A4.1 4.1 0 0 0 8.423.2 4.15 4.15 0 0 0 6.305.086a4.1 4.1 0 0 0-1.891.948 4.04 4.04 0 0 0-1.158 1.753 4.1 4.1 0 0 0-1.563.679A4 4 0 0 0 .554 4.72a3.99 3.99 0 0 0 .502 4.731 3.94 3.94 0 0 0 .346 3.274 4.11 4.11 0 0 0 4.402 1.933c.382.425.852.764 1.377.995.526.231 1.095.35 1.67.346 1.78.002 3.358-1.132 3.901-2.804a4.1 4.1 0 0 0 1.563-.68 4 4 0 0 0 1.14-1.253 3.99 3.99 0 0 0-.506-4.716m-6.097 8.406a3.05 3.05 0 0 1-1.945-.694l.096-.054 3.23-1.838a.53.53 0 0 0 .265-.455v-4.49l1.366.778q.02.011.025.035v3.722c-.003 1.653-1.361 2.992-3.037 2.996m-6.53-2.75a2.95 2.95 0 0 1-.36-2.01l.095.057L5.29 12.09a.53.53 0 0 0 .527 0l3.949-2.246v1.555a.05.05 0 0 1-.022.041L6.473 13.3c-1.454.826-3.311.335-4.15-1.098m-.85-6.94A3.02 3.02 0 0 1 3.07 3.949v3.785a.51.51 0 0 0 .262.451l3.93 2.237-1.366.779a.05.05 0 0 1-.048 0L2.585 9.342a2.98 2.98 0 0 1-1.113-4.094zm11.216 2.571L8.747 5.576l1.362-.776a.05.05 0 0 1 .048 0l3.265 1.86a3 3 0 0 1 1.173 1.207 2.96 2.96 0 0 1-.27 3.2 3.05 3.05 0 0 1-1.36.997V8.279a.52.52 0 0 0-.276-.445m1.36-2.015-.097-.057-3.226-1.855a.53.53 0 0 0-.53 0L6.249 6.153V4.598a.04.04 0 0 1 .019-.04L9.533 2.7a3.07 3.07 0 0 1 3.257.139c.474.325.843.778 1.066 1.303.223.526.289 1.103.191 1.664zM5.503 8.575 4.139 7.8a.05.05 0 0 1-.026-.037V4.049c0-.57.166-1.127.476-1.607s.752-.864 1.275-1.105a3.08 3.08 0 0 1 3.234.41l-.096.054-3.23 1.838a.53.53 0 0 0-.265.455zm.742-1.577 1.758-1 1.762 1v2l-1.755 1-1.762-1z"/></svg></span>
        Codex
      </div>
      <div class="qs-item" data-cmd="shell" data-label="terminal">
        <span class="qs-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></span>
        Terminal
      </div>
      <div class="qs-section-label">SSH Hosts</div>
      <div id="qs-ssh-hosts"><span class="qs-loading">Loading...</span></div>
    </div>
  </div>
  <div id="terminal-list-wrapper">
    <button id="terminal-list-toggle" title="Open terminals">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="5" height="5" rx="1"/>
        <rect x="9" y="2" width="5" height="5" rx="1"/>
        <rect x="2" y="9" width="5" height="5" rx="1"/>
        <rect x="9" y="9" width="5" height="5" rx="1"/>
      </svg>
      <span id="terminal-count">0</span>
    </button>
    <div id="terminal-list" class="hidden">
      <div id="terminal-list-items"></div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="terminal-container"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
