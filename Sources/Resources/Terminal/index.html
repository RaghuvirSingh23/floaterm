<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="stylesheet" href="xterm.css" />
    <style>
      :root {
        --term-background: #000;
        --term-foreground: #fff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--term-background);
      }

      #terminal {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .xterm {
        height: 100%;
      }

      .xterm .xterm-screen,
      .xterm .xterm-screen canvas,
      .xterm-viewport {
        margin: 0 !important;
        padding: 0 !important;
      }

      .xterm-viewport {
        overflow: hidden !important;
        background: var(--term-background) !important;
      }

      .xterm .composition-view {
        background: var(--term-background) !important;
        color: var(--term-foreground) !important;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>

    <script src="xterm.js"></script>
    <script src="addon-fit.js"></script>
    <script>
      const container = document.getElementById("terminal");
      const TERM_THEMES = {
        dark: {
          background: "#000000",
          foreground: "#ffffff",
          cursor: "#ffffff",
          selectionBackground: "#444444",
          black: "#000000",
          red: "#cd3131",
          green: "#0dbc79",
          yellow: "#e5e510",
          blue: "#2472c8",
          magenta: "#bc3fbc",
          cyan: "#11a8cd",
          white: "#e5e5e5",
          brightBlack: "#666666",
          brightRed: "#f14c4c",
          brightGreen: "#23d18b",
          brightYellow: "#f5f543",
          brightBlue: "#3b8eea",
          brightMagenta: "#d670d6",
          brightCyan: "#29b8db",
          brightWhite: "#ffffff"
        },
        light: {
          background: "#f6f3ee",
          foreground: "#1f2328",
          cursor: "#1f2328",
          selectionBackground: "#c8d7f8",
          black: "#1f2328",
          red: "#c0392b",
          green: "#1f8b4c",
          yellow: "#8f6a00",
          blue: "#005cc5",
          magenta: "#8250df",
          cyan: "#0f766e",
          white: "#e8ecf1",
          brightBlack: "#5f6773",
          brightRed: "#cf222e",
          brightGreen: "#2da44e",
          brightYellow: "#bf8700",
          brightBlue: "#0969da",
          brightMagenta: "#a475f9",
          brightCyan: "#1b7f83",
          brightWhite: "#ffffff"
        }
      };

      function applyTheme(name) {
        const theme = TERM_THEMES[name] ?? TERM_THEMES.dark;
        term.options.theme = theme;
        document.documentElement.style.setProperty("--term-background", theme.background);
        document.documentElement.style.setProperty("--term-foreground", theme.foreground);
      }

      const term = new Terminal({
        allowTransparency: false,
        cursorBlink: true,
        cursorStyle: "block",
        fontFamily: '"SF Mono", Menlo, Monaco, monospace',
        fontSize: 13,
        letterSpacing: 0.2,
        lineHeight: 1.15,
        macOptionIsMeta: true,
        scrollback: 6000,
        theme: TERM_THEMES.dark
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      applyTheme("dark");

      const encoder = new TextEncoder();

      function post(message) {
        const handler = window.webkit?.messageHandlers?.terminal;
        if (handler) {
          handler.postMessage(message);
        }
      }

      function bytesToBase64(bytes) {
        let binary = "";
        for (const byte of bytes) {
          binary += String.fromCharCode(byte);
        }
        return btoa(binary);
      }

      function base64ToBytes(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes;
      }

      function fit() {
        fitAddon.fit();
        post({ type: "resize", cols: term.cols, rows: term.rows });
      }

      term.onData((data) => {
        post({ type: "input", data: bytesToBase64(encoder.encode(data)) });
      });

      term.onKey(() => {
        term.focus();
      });

      document.addEventListener("mousedown", () => term.focus());
      window.addEventListener("focus", () => term.focus());

      window.termBridge = {
        focus() {
          term.focus();
        },
        fit,
        markExited() {
          term.write("\r\n\x1b[90m[terminal exited]\x1b[0m\r\n");
        },
        applyTheme,
        writeBase64(base64) {
          term.write(base64ToBytes(base64));
        }
      };

      window.requestAnimationFrame(() => {
        term.focus();
      });
    </script>
  </body>
</html>
