name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-tests:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run test suite
        run: swift test

      - name: Validate release packaging
        env:
          RELEASE_VERSION: ci-${{ github.sha }}
          RELEASE_BUILD_NUMBER: ${{ github.run_number }}
        run: ./script/build_release.sh
