name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create macOS .icns
        if: matrix.platform == 'mac'
        run: |
          mkdir -p build/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size build/icon.png --out build/icon.iconset/icon_${size}x${size}.png
          done
          for size in 16 32 128 256 512; do
            s2=$((size*2))
            sips -z $s2 $s2 build/icon.png --out build/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns build/icon.iconset -o build/icon.icns
          rm -rf build/icon.iconset

      - name: Build
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floaterm-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: floaterm v${{ steps.version.outputs.version }}
          body: |
            ## floaterm v${{ steps.version.outputs.version }}

            **Downloads:**
            - **macOS**: `.dmg` or `.zip`
            - **Windows**: `.exe` installer or `.zip`
            - **Linux**: `.AppImage` or `.deb`

            **Or install via npm:**
            ```
            npx floaterm
            ```
          files: artifacts/**/*
          draft: false
          prerelease: false
