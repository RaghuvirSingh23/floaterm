name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Tauri app
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floaterm-mac
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

      - name: Get version
        id: version
        run: echo "version=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: floaterm v${{ steps.version.outputs.version }}
          body: |
            ## floaterm v${{ steps.version.outputs.version }}

            **14MB app — 17x smaller than Electron**

            Powered by Tauri (Rust + system WebView). No runtime dependencies.

            **Downloads:**
            - **macOS**: `.dmg`
          files: src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
